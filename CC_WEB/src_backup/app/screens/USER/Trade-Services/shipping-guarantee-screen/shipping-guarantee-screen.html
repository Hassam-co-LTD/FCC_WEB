<div class="screen">
  <app-sidebar [steps]="shippingGuaranteeSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
  </app-sidebar>

  <div class="content">
    <div class="scroll-area">
      <section id="section-0"><app-general-details></app-general-details></section>
      <hr class="section-divider" />

      <section id="section-1"><app-applicant-beneficiary></app-applicant-beneficiary></section>
      <hr class="section-divider" />

      <section id="section-2"><app-bank-details></app-bank-details></section>
      <hr class="section-divider" />

      <section id="section-3"><app-instructions></app-instructions></section>
      <hr class="section-divider" />

      <section id="section-4">
        <app-attachments (filesChange)="updateAttachments($event)"></app-attachments>
      </section>


      <div class="actions">
        <button mat-stroked-button (click)="back()">Back</button>
        <button mat-flat-button color="primary">Save</button>
        <button mat-flat-button color="primary" (click)="goToPreview()">Preview</button>
      </div>
    </div>
  </div>
</div>

<!-- The preview will be loaded via child route, no ngIf needed -->
<router-outlet></router-outlet>
