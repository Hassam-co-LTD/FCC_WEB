<div class="export-collection-screen">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <ul class="steps">
      <li 
        *ngFor="let step of steps; let i = index"
        [class.active]="currentStep === i"
        (click)="scrollToSection(i)"
      >
        <span class="step-number">{{ i + 1 }}</span>
        <span class="step-label">{{ step.label }}</span>
      </li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="scroll-area">

      <!-- SECTIONS -->
      <section id="section-0"><app-general-details></app-general-details></section>
      <section id="section-1"><app-drawer-drawee-details></app-drawer-drawee-details></section>
      <section id="section-2"><app-bank-details></app-bank-details></section>
      <section id="section-3"><app-payment-amount></app-payment-amount></section>
      <section id="section-4"><app-shipping-details></app-shipping-details></section>
      <section id="section-5"><app-licenses></app-licenses></section>
      <section id="section-6"><app-collection-instructions></app-collection-instructions></section>
      <section id="section-7"><app-attachments-documents></app-attachments-documents></section>
      <section id="section-8"><app-preview-section></app-preview-section></section>

      <!-- SUBMIT BUTTON
      <div class="actions-row">
        <button type="submit" class="btn-primary">Submit</button>
      </div> -->

    </div>
  </div>
</div>
