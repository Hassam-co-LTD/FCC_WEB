<form [formGroup]="form">
  <div class="accordion-section" id="license">
    <div class="accordion-header" (click)="toggleSection('license')">
      <h2>License</h2>
      <span class="arrow" [class.rotate]="activeSection==='license'">&#9660;</span>
    </div>
    <div class="accordion-content" *ngIf="activeSection==='license'">
      <div class="form-group two-col">
        <div class="input-field">
          <label>License Type</label>
          <select formControlName="licenseType">
            <option *ngFor="let l of licenseTypes">{{l}}</option>
          </select>
        </div>
        <div class="input-field">
          <label>License Number</label>
          <input type="text" formControlName="licenseNumber" />
        </div>
      </div>
    </div>
  </div>
</form>
