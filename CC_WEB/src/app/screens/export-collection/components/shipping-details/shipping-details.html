<form [formGroup]="form">

  <!-- Shipping Details -->
  <div class="accordion-section" id="shipmentDetails">
    <div class="accordion-header" (click)="toggleSection('shipmentDetails')">
      <h2>Shipment Details</h2>
      <span class="arrow" [class.rotate]="activeSection==='shipmentDetails'">&#9660;</span>
    </div>

    <div class="accordion-content" *ngIf="activeSection==='shipmentDetails'">

      <div class="form-group two-col">

        <div class="input-field">
          <label>Shipping Method</label>
          <select formControlName="shippingMethod">
            <option *ngFor="let m of shippingMethods">{{m}}</option>
          </select>
        </div>

        <div class="input-field">
          <label>Shipment Reference</label>
          <input type="text" formControlName="shipmentReference" />
        </div>

      </div>

      <div class="input-field">
        <label>Shipment Date</label>
        <input type="date" formControlName="shipmentDate" />
      </div>

    </div>
  </div>

</form>
