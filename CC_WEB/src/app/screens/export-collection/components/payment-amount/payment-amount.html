<!-- Payment -->
      <div class="accordion-section" id="payment">
        <div class="accordion-header" (click)="toggleSection('payment')">
          <h2>Payment & Amount</h2>
          <span class="arrow" [class.rotate]="activeSection==='payment'">&#9660;</span>
        </div>
        <div class="accordion-content" *ngIf="activeSection==='payment'">
          <div class="form-group two-col">
            <div class="input-field">
              <label>Amount <span class="required">*</span></label>
              <input type="number" formControlName="amount" />
            </div>
            <div class="input-field">
              <label>Currency <span class="required">*</span></label>
              <select formControlName="currency">
                <option *ngFor="let c of currencies">{{c}}</option>
              </select>
            </div>
          </div>
          <div class="form-group two-col">
            <div class="input-field">
              <label>Payment Type <span class="required">*</span></label>
              <select formControlName="paymentType">
                <option value="Documentagainstpayment">Sight/Document Against Payment</option>
                <option value="DocumentagainstAcceptance">Document Against Acceptance</option>
                <option value="PourAval">Pour Aval</option>
              </select>
              <div class="input-field">
              <label>Tenor <span class="required">*</span></label>
              <select formControlName="Tenor">
                <option value="billOfLading">bill of Lading</option>
                <option value="invoice">invoice</option>
                <option value="shipmentDate">shipmentDate</option>
                <option value="Sight">Sight</option>
              </select>
                <div class="input-field">
              <label>Payment Reference </label>
              <input type="text" formControlName="paymentreference" />
            </div>
            </div>
          </div>
        </div>
      </div>
