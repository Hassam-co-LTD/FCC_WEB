 <!-- Preview -->
      <div class="accordion-section" id="preview">
        <div class="accordion-header" (click)="toggleSection('preview')">
          <h2>Preview</h2>
          <span class="arrow" [class.rotate]="activeSection==='preview'">&#9660;</span>
        </div>
        <div class="accordion-content" *ngIf="activeSection==='preview'">
          <pre>{{ ecForm.value | json }}</pre>
          <div *ngIf="coverFileName">
            <strong>Cover Letter:</strong> {{ coverFileName }}
          </div>
          <div *ngIf="uploadedFiles.length">
            <strong>Attachments:</strong>
            <ul>
              <li *ngFor="let f of uploadedFiles">{{ f.name }}</li>
            </ul>
          </div>
        </div>
      </div>
