<!-- General Details -->
<div class="accordion-section" id="general">
  <div class="accordion-header" (click)="toggleSection('general')">
    <h2>General Details</h2>
    <span class="arrow" [class.rotate]="activeSection === 'general'">&#9660;</span>
  </div>

  <div class="accordion-content" *ngIf="activeSection === 'general'">

    <!-- FORM GROUP WRAPPER (Required!) -->
    <form [formGroup]="form">

      <div class="form-group two-col">

        <!-- Collection Type -->
        <div class="input-field">
          <label>Collection Type <span class="required">*</span></label>
          <select formControlName="collectionType">
            <option value="regular">Regular</option>
            <option value="DirectBank">Direct Bank</option>
            <option value="DirectCustomer">Direct Customer</option>
          </select>
        </div>

        <!-- Customer Reference -->
        <div class="input-field">
          <label>Customer Reference</label>
          <input type="text" formControlName="customerReference" />
        </div>

      </div>

      <!-- Drawee Reference
        <div class="input-field">
          <label>Drawee Reference</label>
          <input type="text" formControlName="customerReference" />
        </div> -->
    </form>
  </div>
</div>
