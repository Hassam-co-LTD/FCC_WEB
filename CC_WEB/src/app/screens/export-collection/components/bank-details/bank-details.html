 <form [formGroup]="form"></form>
 <!-- Bank Details -->
      <div class="accordion-section" id="bankDetails">
        <div class="accordion-header" (click)="toggleSection('bankDetails')">
          <h2>Bank Details</h2>
          <span class="arrow" [class.rotate]="activeSection==='bankDetails'">&#9660;</span>
        </div>
        <div class="accordion-content" *ngIf="activeSection==='bankDetails'">
          <div class="bank-tabs">
            <div class="tab" [class.active]="bankTab==='remitting'" (click)="switchBankTab('remitting')">Remitting</div>
            <div class="tab" [class.active]="bankTab==='presenting'" (click)="switchBankTab('presenting')">Presenting
            </div>
            <div class="tab" [class.active]="bankTab==='collecting'" (click)="switchBankTab('collecting')">Collecting
            </div>
          </div>

          <div class="tab-content" *ngIf="bankTab==='remitting'">
            <div class="form-group two-col">
              <div class="input-field">
                <label>Bank Name <span class="required">*</span></label>
                <select formControlName="remittingBankName">
                  <option *ngFor="let b of bankList">{{b}}</option>
                </select>
              </div>
              <div class="input-field">
                <label>Issuer Reference<span class="required">*</span></label>
                <input type="text" formControlName="remittingIssuerRef" />
              </div>
              <div class="input-field">
                <label>Principal Account<span class="required">*</span></label>
                <select formControlName="principalAccount">
                  <option value="">Select Account</option>
                  <!-- <option *ngFor="let account of issuingBanks" [value]="account">{{ account }}</option> -->
                </select>
              </div>
              <div class="input-field">
                <label>Fee Account<span class="required">*</span></label>
                <select formControlName="feeAccount">
                  <option value="">Select Account</option>
                  <!-- <option *ngFor="let account of issuingBanks" [value]="account">{{ account }}</option> -->
                </select>
              </div>
            </div>
          </div>

          <div class="tab-content" *ngIf="bankTab==='presenting'">
            <div class="form-group two-col">
              <div class="input-field">
                <label>Bank Name <span class="required">*</span></label>
                <select formControlName="remittingBankName">
                  <option *ngFor="let b of bankList">{{b}}</option>
                </select>
              </div>
              <div class="input-field">
                <label>Address1</label>
                <input type="text" formControlName="presentingAddress1" />
              </div>
              <div class="input-field">
                <label>Address2</label>
                <input type="text" formControlName="presentingAddress2" />
              </div>
            </div>
          </div>

          <div class="tab-content" *ngIf="bankTab==='collecting'">
            <div class="form-group two-col">
              <div class="input-field">
                <label>Collecting Bank</label>
                <select formControlName="collectingBankName">
                  <option *ngFor="let b of bankList">{{b}}</option>
                </select>
              </div>
              <div class="input-field swift-field">
                <label>SWIFT Code</label>
                <div class="swift-wrapper">
                  <input type="text" formControlName="collectingSwiftCode" />
                </div>
              </div>
              <div class="input-field">
                <label>Reference</label>
                <input type="text" formControlName="collectingReference" />
              </div>
            </div>
          </div>
        </div>
      </div>
