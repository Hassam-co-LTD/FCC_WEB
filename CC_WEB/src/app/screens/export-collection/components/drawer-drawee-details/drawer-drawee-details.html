 <!-- Drawer & Drawee Details -->
      <div class="accordion-section" id="drawer">
        <div class="accordion-header" (click)="toggleSection('drawer')">
          <h2>Drawer & Drawee Details</h2>
          <span class="arrow" [class.rotate]="activeSection==='drawer'">&#9660;</span>
        </div>
        <div class="accordion-content" *ngIf="activeSection==='drawer'">

          <h3>Drawer</h3>
          <div class="form-group two-col">
            <div class="input-field">
              <label>Drawer Name <span class="required">*</span></label>
              <input type="text" formControlName="drawerName" />
            </div>
            <div class="input-field">
              <label>Address 1 <span class="required">*</span></label>
              <input type="text" formControlName="drawerAddress1" />
            </div>
            <div class="input-field">
              <label>Address 2</label>
              <input type="text" formControlName="drawerAddress2" />
            </div>
          </div>

          <h3>Drawee</h3>
          <div class="form-group two-col">
            <div class="input-field">
              <label>DraweeName <span class="required">*</span></label>
              <input type="text" formControlName="draweeName" />
            </div>
            <div class="input-field">
              <label>Address 1 <span class="required">*</span></label>
              <input type="text" formControlName="draweeAddress1" />
            </div>
            <div class="input-field">
              <label>Address 2</label>
              <input type="text" formControlName="draweeAddress2" />
            </div>
          </div>

        </div>
      </div>
