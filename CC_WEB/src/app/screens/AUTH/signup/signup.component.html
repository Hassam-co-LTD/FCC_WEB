<div class="auth-container">
  <mat-card>
    <h2>Sign Up</h2>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input placeholder="Name" matInput [(ngModel)]="name" name="name" type="text" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input placeholder="Email" matInput [(ngModel)]="email" name="email" type="email" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input placeholder="Enter Password" [type]="hidePassword ? 'password' : 'text'" matInput [(ngModel)]="password"
          name="password" required />

        <button mat-icon-button matSuffix matTooltip="Show / Hide Password" type="button" (click)="togglePassword()"
          [attr.aria-label]="'Toggle password visibility'">
          <mat-icon>
            {{ hidePassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>
      </mat-form-field>


      <button mat-flat-button color="primary" class="full-width" type="submit" (click)="onSignup()">Sign up</button>
    
    <p>
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </mat-card>
</div>
