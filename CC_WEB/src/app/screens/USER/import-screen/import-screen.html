<div class="screen">
    <!-- Sidebar -->
    <app-sidebar [steps]="importSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
    </app-sidebar>

    
    <!-- Main Content -->
    <div class="content">
        <div class="scroll-area">

            <section id="section-0"><app-general-details [form]="generalDetailsForm"></app-general-details></section>
            <hr class="section-divider" />

            <section id="section-1"><app-applicant-beneficiary></app-applicant-beneficiary></section>
            <hr class="section-divider" />

            <section id="section-2"><app-bank-details></app-bank-details></section>
            <hr class="section-divider" />

            <section id="section-3"><app-amount-charge-details></app-amount-charge-details></section>
            <hr class="section-divider" />

            <section id="section-4"><app-undertaking-details></app-undertaking-details></section>
            <hr class="section-divider" />

            <section id="section-5"><app-payment-details></app-payment-details></section>
            <hr class="section-divider" />

            <section id="section-6"><app-shipment-details></app-shipment-details></section>
            <hr class="section-divider" />

            <section id="section-8"><app-narrative-details></app-narrative-details></section>
            <hr class="section-divider" />

            <section id="section-9"><app-licenses></app-licenses></section>
            <hr class="section-divider" />

            <section id="section-10"><app-instruction-to-bank></app-instruction-to-bank></section>
            <hr class="section-divider" />

            <section id="section-11"><app-attachments></app-attachments></section>
            <hr class="section-divider" />

            <section id="section-12"><app-preview [form]="importForm"></app-preview></section>

            <!-- Footer Buttons -->
            <div class="actions">
                <button mat-stroked-button (click)="previous()" [disabled]="currentStep==0">Back</button>
                <button mat-flat-button color="primary" (click)="next()">Submit</button>
            </div>

        </div>
    </div>
</div>
