<div class="section-header" (click)="toggle()">
    <h2>Instructions to Bank</h2>
    <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen">
    <form class="instruction-form" [formGroup]="form" >

        <!-- Accounts Row -->
        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Principal Account</mat-label>
                <mat-select formControlName="principalAccount">
                    <mat-option value="account1">Account 1</mat-option>
                    <mat-option value="account2">Account 2</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('principalAccount')?.hasError('required')">
                    Required
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Fee Account</mat-label>
                <mat-select formControlName="feeAccount">
                    <mat-option value="fee1">Fee Account 1</mat-option>
                    <mat-option value="fee2">Fee Account 2</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('feeAccount')?.hasError('required')">
                    Required
                </mat-error>
            </mat-form-field>
        </div>

        <!-- Other Instructions -->
        <div class="form-row full-width">
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Other Instructions</mat-label>
                <textarea matInput formControlName="otherInstructions" rows="4" maxlength="31525"></textarea>
                <mat-hint align="end">
                    {{ form.get('otherInstructions')?.value?.length || 0 }}/31525
                </mat-hint>
            </mat-form-field>
        </div>

    </form>
</div>
