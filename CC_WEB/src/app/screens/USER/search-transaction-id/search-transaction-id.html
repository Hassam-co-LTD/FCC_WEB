<div class="ui-container">

    <!-- HEADER + ACTION BUTTONS -->
    <div class="ui-header">
        <h1>Search By ID</h1>
<!-- 
        <div class="ui-actions">
            <button class="btn-outline">Templates</button>
            <button class="btn-primary" [routerLink]="['/undertaking-issuance/request-undertaking/general-details']"
                routerLinkActive="active-link">
                Request Undertaking
            </button>
        </div> -->
    </div>

    <!-- TAB SECTION -->
    <div class="ui-tabs">
        <div class="tab active">Live (0)</div>
        <div class="tab">Draft (1)</div>
        <div class="tab">Actions (0)</div>
        <div class="tab">Pending Approval (0)</div>
        <div class="tab">Pending at Bank (1)</div>
        <div class="tab">Rejected (0)</div>
        <div class="tab">Closed (0)</div>
    </div>

    <!-- FILTER ROW -->
    <div class="filter-row">
        <div class="form-group">
            <label>Select Preference</label>
            <select>
                <option>Standard</option>
            </select>
        </div>
    </div>

    <!-- ADVANCED FILTER COLLAPSIBLE -->
    <div class="advanced-filter">
        <div class="toggle">
            <mat-icon>keyboard_arrow_down</mat-icon>
            Advanced Filter
        </div>
    </div>

    <!-- TABLE SECTION -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Channel Reference</th>
                    <th>Customer Reference</th>
                    <th>Bank Reference</th>
                    <th>Issue Date</th>
                    <th>Status</th>
                    <th>Beneficiary</th>
                    <th>Currency</th>
                    <th>Amount</th>
                    <th>Outstanding Amount</th>
                    <th>Expiry Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td colspan="11" class="no-records">No Records Found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
