<div class="ui-container">
  <div class="ui-header">
    <div class="header-content">
      <h1>Undertaking Issued</h1>
      <p class="subtitle">Manage all undertaking transactions</p>
    </div>
    
    <div class="ui-actions">
      <button class="btn-outline" matTooltip="View templates">
        <mat-icon>description</mat-icon>
        Templates
      </button>
      <button class="btn-primary" [routerLink]="['/undertaking-issuance/request-undertaking/general-details']">
        <mat-icon>add_circle</mat-icon>
        Request Undertaking
      </button>
    </div>
  </div>

  <div class="ui-tabs">
    <div *ngFor="let tab of tabs" 
         class="tab" 
         [class.active]="activeTab === tab.id" 
         (click)="setActiveTab(tab.id)">
      {{ tab.name }} ({{ getTabCount(tab.id) }})
    </div>
  </div>

  <div class="filter-row">
    <div class="results-summary">
      Showing {{ pagedUndertakings.length }} of {{ filteredUndertakings.length }} records

    </div>
  </div>
