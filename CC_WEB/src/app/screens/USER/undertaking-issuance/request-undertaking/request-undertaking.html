<div class="screen">
    <!-- Sidebar -->
    <app-sidebar [steps]="undertakingSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
    </app-sidebar>
    <!-- Main Content -->
    <div class="content">
        <div class="scroll-area">


            <section id="section-0"><app-general-details-undertaking></app-general-details-undertaking></section>
            <hr class="section-divider" />

            <section id="section-1"><app-application-beneficiary></app-application-beneficiary></section>
            <hr class="section-divider" />

            <section id="section-2"><app-bank-details></app-bank-details></section>
            <hr class="section-divider" />

            <section id="section-3"><app-undertaking-details></app-undertaking-details></section>
            <hr class="section-divider" />

            <section id="section-4"><app-instructions-bank></app-instructions-bank></section>
            <hr class="section-divider" />

            <section id="section-5"><app-attachments></app-attachments></section>
            <hr class="section-divider" />

            <section id="section-6"><app-preview></app-preview></section>
            <hr class="section-divider" />


            <!-- Footer Buttons -->
            <div class="actions">
                <button mat-stroked-button (click)="previous()" [disabled]="currentStep==0">Back</button>
                <button mat-flat-button color="primary" (click)="next()">Submit</button>
            </div>

        </div>
    </div>
</div>
