<div class="screen">
    <!-- Sidebar -->
    <app-sidebar [steps]="undertakingSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
    </app-sidebar>
    <!-- Main Content -->
    <div class="content">
        <div class="scroll-area">

            <section id="section-0"> <app-general-details [form]="generalDetailsForm"></app-general-details></section>
            <hr class="section-divider" />

            <section id="section-1"><app-application-beneficiary
                    [form]="applicationBeneficary"></app-application-beneficiary></section>
            <hr class="section-divider" />

            <section id="section-2"><app-bank-details [form]="bankForm"></app-bank-details></section>
            <hr class="section-divider" />

            <section id="section-3"><app-undertaking-details [form]="undertakingdetail"></app-undertaking-details>
            </section>
            <hr class="section-divider" />

            <section id="section-4"><app-instructions-bank [form]="instructionsbank"></app-instructions-bank></section>
            <hr class="section-divider" />

            <section id="section-5"><app-attachments (filesChange)="updateAttachments($event)"></app-attachments>
            </section>
            <hr class="section-divider" />



            <!-- Footer Buttons -->
            <div class="actions">
                <button mat-stroked-button (click)="previous()">Back</button>
                <button mat-flat-button color="primary" (click)="saveForm()">Save</button>
                <button mat-flat-button color="primary" (click)="submit()">Preview</button>
            </div>

        </div>
    </div>
</div>
