<div class="section-header" (click)="toggle()">
  <h2>Instructions</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<!-- COLLAPSIBLE -->
<div class="collapsible" [class.open]="isOpen">
  <form [formGroup]="form" class="details-form">

    <mat-form-field appearance="outline" class="full">
      <mat-label>Instruction Type *</mat-label>
      <input matInput formControlName="instructionType" placeholder="Enter instruction type" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Instruction Details *</mat-label>
      <textarea matInput formControlName="details" rows="4" maxlength="300" placeholder="Enter detailed instructions">
      </textarea>
      <mat-hint align="end">{{ form.get('details')?.value?.length || 0 }}/300</mat-hint>
    </mat-form-field>

    <!-- <div class="actions">
      <button type="button" mat-stroked-button (click)="toggle()">Cancel</button>
      <button type="submit" mat-flat-button color="primary" [disabled]="form.invalid">Save</button>
    </div> -->
  </form>
</div>
