<div class="section-header" (click)="toggle()">
  <h2>Issuing Bank and Amount</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<!-- COLLAPSIBLE -->
<div class="collapsible" [class.open]="isOpen">
  <form [formGroup]="form" class="details-form">

    <mat-form-field appearance="outline" class="full">
      <mat-label>Bank Name *</mat-label>
      <input matInput type="text" formControlName="bankName" placeholder="Enter bank name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Issuer Reference *</mat-label>
      <input matInput type="text" formControlName="issuerReference" placeholder="Enter Issuer Reference" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Currency *</mat-label>
      <input matInput type="text" formControlName="currency" placeholder="Enter Currency" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>SWIFT Code</mat-label>
      <input matInput type="text" formControlName="swiftCode" placeholder="Enter SWIFT code" />
    </mat-form-field>

    <!-- <div class="actions">
      <button type="button" mat-stroked-button (click)="toggle()">Cancel</button>
      <button type="submit" mat-flat-button color="primary" [disabled]="form.invalid">
        Save
      </button>
    </div> -->

  </form>
</div>
