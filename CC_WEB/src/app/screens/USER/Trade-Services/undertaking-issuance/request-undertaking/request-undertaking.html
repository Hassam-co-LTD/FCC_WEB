<div class="screen">
    <app-sidebar 
        [steps]="undertakingSteps" 
        [currentStep]="currentStep" 
        (stepChange)="scrollToSection($event)">
    </app-sidebar>

    <div class="content">
        <div class="scroll-area" (scroll)="onScroll($event)" #scrollContainer>
            <section id="section-0"><app-general-details [form]="generalDetails"></app-general-details></section>
            <section id="section-1"><app-application-beneficiary [form]="applicantBeneficiary"></app-application-beneficiary></section>
            <section id="section-2"><app-bank-details [form]="bankForm"></app-bank-details></section>
            <section id="section-3"><app-undertaking-details [form]="undertakingDetails"></app-undertaking-details></section>
            <section id="section-4"><app-instructions-bank [form]="instructions"></app-instructions-bank></section>
            <section id="section-5"><app-attachments (filesChange)="updateAttachments($event)"></app-attachments></section>

            <div class="actions">
                
                <ng-container *ngIf="pageMode === 'CREATE'">
                    <button mat-stroked-button (click)="back()">Back</button>
                    <button mat-flat-button color="primary" (click)="saveForm()">Save</button>
                </ng-container>

                <ng-container *ngIf="pageMode === 'EDIT'">
                    <!-- <button mat-stroked-button (click)="back()">Back</button> -->
                    <button mat-stroked-button color="primary" (click)="update()">Update</button>
                    <button mat-flat-button color="accent" (click)="submit()">Submit</button>
                </ng-container>

                <ng-container *ngIf="pageMode === 'CHECKER'">
                    <!-- <button mat-stroked-button (click)="back()">Back</button> -->
                    <button mat-flat-button color="warn" (click)="reject()">Reject</button>
                    <button mat-flat-button color="primary" (click)="approve()">Approve</button>
                </ng-container>

                <ng-container *ngIf="pageMode === 'VIEW'">
                    <button mat-stroked-button (click)="back()">Back</button>
                </ng-container>

                <ng-container *ngIf="pageMode === 'CORRECT'">
                    <button mat-stroked-button (click)="back()">Back</button>
                    <button mat-flat-button color="primary" (click)="update()">Update</button>
                </ng-container>

            </div>
            </div>
    </div>
</div>
