<div class="section-header" (click)="toggle()">
  <h2>Attachments</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen">
  <p class="hint">Maximum 5 Files of 1 MB each</p>
  <p class="extensions">Valid extensions: PNG, JPEG, JPG, RTF, CSV, XLS, XLSX, DOCX, TXT, DOC, PDF, GIF.</p>

  <div class="dropzone" (dragover)="onDragOver($event)" (drop)="onFileDropped($event)">
    <mat-icon>cloud_upload</mat-icon>
    <p>Drag and Drop File</p>
    <input type="file" multiple hidden #fileInput (change)="onFileSelected($event)" />
    <button mat-stroked-button color="primary" (click)="fileInput.click()">Browse</button>
  </div>

  <div class="file-list" *ngIf="uploadedFiles.length > 0">
    <div *ngFor="let file of uploadedFiles; let i = index" class="file-item">
      <span>{{ file.name }}</span>
      <button mat-icon-button color="warn" (click)="removeFile(i)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </div>

  <form [formGroup]="attachmentsForm">
    <div formArrayName="documents">
      <div *ngFor="let doc of documents.controls; let i=index" [formGroupName]="i" class="instruction-form">
        <div class="form-group two-col">
          <div class="input-field">
            <label>Document Name & Type<span class="required">*</span></label>
            <select formControlName="type">
              <option value="">Select Type</option>
              <option value="airwayBill">Airway Bill</option>
              <option value="billOfLading">Bill of Lading</option>
            </select>
          </div>

          <div class="input-field">
            <label>Attachment <span class="required">*</span></label>

            <div class="attachment-field">
              <input type="text" [value]="doc.get('attachment')?.value?.fileName || ''"
                placeholder="Search or select file" readonly />
              <button type="button" (click)="selectAttachment(i)">🔍</button>
            </div>
          </div>
          <div class="input-field">
            <label>Document Date<span class="required">*</span></label>
            <input type="date" formControlName="date" />
          </div>

          <button type="button" class="btn-remove" (click)="removeDocument(i)">Remove</button>
        </div>
      </div>
    </div>

    <button type="button" class="btn-add" (click)="addDocument()">+ Add Document</button>
  </form>
</div>
