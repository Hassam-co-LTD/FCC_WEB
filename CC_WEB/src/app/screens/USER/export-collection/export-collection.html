<div class="screen">
  <!-- SIDEBAR -->
  <app-sidebar [steps]="exportCollectionSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
  </app-sidebar>
  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="scroll-area">

      <!-- SECTIONS -->
      <section id="section-0"><app-general-details></app-general-details></section>
      <hr class="section-divider" />

      <section id="section-1"><app-drawer-drawee-details></app-drawer-drawee-details></section>
      <hr class="section-divider" />

      <section id="section-2"><app-bank-details></app-bank-details></section>
      <hr class="section-divider" />

      <section id="section-3"><app-payment-amount></app-payment-amount></section>
      <hr class="section-divider" />

      <section id="section-4"><app-shipping-details></app-shipping-details></section>
      <hr class="section-divider" />

      <section id="section-6"><app-collection-instructions></app-collection-instructions></section>
      <hr class="section-divider" />
      
      <section id="section-5"><app-license></app-license></section>
      <hr class="section-divider" />

      <section id="section-7"><app-attachments-documents></app-attachments-documents></section>
      <hr class="section-divider" />

      <section id="section-8"><app-preview></app-preview></section>

      <!-- Footer Buttons -->
      <div class="actions">
        <button mat-stroked-button (click)="previous()" [disabled]="currentStep==0">Back</button>
        <button mat-flat-button color="primary" (click)="next()">Submit</button>
      </div>
    </div>
  </div>

</div>
