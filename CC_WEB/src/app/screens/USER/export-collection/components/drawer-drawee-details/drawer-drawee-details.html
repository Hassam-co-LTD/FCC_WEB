<!-- Drawer & Drawee Details Accordion -->
<div class="section-header" (click)="toggle()">
  <h2>Drawer & Drawee Details</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen" [formGroup]="form">

  <!-- Drawer Section -->
  <h4 class="sub-title">Drawer</h4>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Drawer Name *</mat-label>
    <input matInput type="text" formControlName="drawerName" placeholder="Enter Drawer Name">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Address 1 *</mat-label>
    <input matInput type="text" formControlName="drawerAddress1" placeholder="Enter Address 1">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Address 2</mat-label>
    <input matInput type="text" formControlName="drawerAddress2" placeholder="Enter Address 2">
  </mat-form-field>

  <!-- Drawee Section -->
  <h4 class="sub-title">Drawee</h4>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Drawee Name *</mat-label>
    <input matInput type="text" formControlName="draweeName" placeholder="Enter Drawee Name">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Address 1 *</mat-label>
    <input matInput type="text" formControlName="draweeAddress1" placeholder="Enter Address 1">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Address 2</mat-label>
    <input matInput type="text" formControlName="draweeAddress2" placeholder="Enter Address 2">
  </mat-form-field>


</div>
