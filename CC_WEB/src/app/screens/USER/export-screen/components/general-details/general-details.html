<div class="section-header" (click)="toggle()">
    <h2>General Details</h2>
    <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen" [formGroup]="form">

    <ng-container *ngIf="isOpen">

        <div class="field-group">
            <h4>Customer Reference</h4>

            <div class="form-row">
                <mat-form-field appearance="outline">
                    <mat-label>Customer Reference</mat-label>
                    <input matInput formControlName="customerRef" placeholder="Enter customer reference">
                </mat-form-field>
            </div>

            <div class="form-grid">

                <div class="form-row">
                    <h4>Advising Bank *</h4>
                    <mat-form-field appearance="outline">
                        <mat-label>Advising Bank</mat-label>
                        <input matInput formControlName="advisingBank" placeholder="Enter advising bank">
                    </mat-form-field>
                </div>

                <div class="form-row">
                    <h4>Issuer Reference *</h4>
                    <mat-form-field appearance="outline">
                        <mat-label>Issuer Reference</mat-label>
                        <input matInput formControlName="issuerRef" placeholder="Enter issuer reference">
                    </mat-form-field>
                </div>

            </div>
        </div>

    </ng-container>
</div>
