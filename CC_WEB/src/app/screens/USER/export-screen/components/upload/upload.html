<div class="section-header" (click)="toggle()">
  <h2>Upload MT700 / MT701</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen">

  <h4>Select File (*.txt / *.pdf)</h4>

  <div class="form-row">
    <input type="file" (change)="onFileChange($event)">
  </div>

  @if (file) {
    <div>
      <p><strong>Selected:</strong> {{ file.name }} ({{ formatFileSize(file.size) }})</p>
    </div>
  }

</div>
