<!-- Only show export screen form if NOT on preview route -->
<div class="screen" *ngIf="!isPreviewRoute">

    <app-sidebar [steps]="exportlcSteps" [currentStep]="currentStep" (stepChange)="scrollToSection($event)">
    </app-sidebar>

    <div class="content">
        <div class="scroll-area">

            <!-- SECTION 0 -->
            <section id="section-0">
                <app-general-details [form]="generalDetailsForm"></app-general-details>
            </section>
            <hr class="section-divider" />

            <!-- SECTION 1 -->
            <section id="section-1">
                <app-upload
  [form]="uploadForm">
</app-upload>

            </section>
            <hr class="section-divider" />

            <!-- SECTION 2 -->
           <section id="section-2">
  <h3>Attachments</h3>
  <app-attachments (filesChange)="onAttachmentsChange($event)"></app-attachments>
</section>
            <hr class="section-divider" />

            <div class="actions">
                <button mat-stroked-button (click)="back()">Back</button>
                <button mat-flat-button color="primary">Save</button>
                <button mat-flat-button color="primary" (click)="preview()">Preview</button>
            </div>
        </div>
    </div>

</div>

<!-- Render preview component here -->
<router-outlet></router-outlet>
