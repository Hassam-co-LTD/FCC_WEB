<div class="section-header" (click)="toggle()">
    <h2>Applicant and Beneficiary Details</h2>
    <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<div class="collapsible" [class.open]="isOpen">
<!-- Applicant Section -->
<h4>Applicant</h4>

<div class="form-grid">
    <mat-form-field>
        <mat-label>Name *</mat-label>
        <input matInput formControlName="applicantName">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 1 *</mat-label>
        <input matInput formControlName="applicantAddress1">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 2</mat-label>
        <input matInput formControlName="applicantAddress2">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 3</mat-label>
        <input matInput formControlName="applicantAddress3">
    </mat-form-field>
</div>

<!-- Alternate Applicant -->
<mat-slide-toggle (change)="toggleAlternate()">
    Alternate Applicant
</mat-slide-toggle>

<div *ngIf="showAlternate" class="form-grid alternate">
    <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput formControlName="alternateName">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 1</mat-label>
        <input matInput formControlName="alternateAddress1">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 2</mat-label>
        <input matInput formControlName="alternateAddress2">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 3</mat-label>
        <input matInput formControlName="alternateAddress3">
    </mat-form-field>
</div>

<!-- Beneficiary -->
<h4>Beneficiary</h4>

<div class="form-grid">
    <mat-form-field>
        <mat-label>Name *</mat-label>
        <input matInput formControlName="beneficiaryName">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 1 *</mat-label>
        <input matInput formControlName="beneficiaryAddress1">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 2</mat-label>
        <input matInput formControlName="beneficiaryAddress2">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Address 3</mat-label>
        <input matInput formControlName="beneficiaryAddress3">
    </mat-form-field>

    <mat-form-field>
        <mat-label>Country *</mat-label>
        <mat-select formControlName="beneficiaryCountry">
            <mat-option value="Pakistan">Pakistan</mat-option>
            <mat-option value="UAE">UAE</mat-option>
            <mat-option value="USA">USA</mat-option>
            <mat-option value="UK">UK</mat-option>
        </mat-select>
    </mat-form-field>
</div>

    <button mat-stroked-button routerLink="../general-details">Previous</button>
    <button mat-raised-button color="primary" (click)="next()">Next</button>
</div> -->

</div>
