<aside class="sidebar">
  <ul class="steps">
    <li *ngFor="let step of steps; let i = index"
        [class.active]="currentStep === i"
        (click)="scrollToSection(i)">
      <span class="step-number">{{ i + 1 }}</span>
      <span class="step-label">{{ step.label }}</span>
    </li>
  </ul>
</aside>


  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="scroll-area">

      <!-- <section id="section-0"><create></create></section>
      <hr class="section-divider" /> -->

      <section id="section-1"><app-general-details></app-general-details></section>
      <hr class="section-divider" />

      <section id="section-2"><app-applicant-beneficiary></app-applicant-beneficiary></section>
      <hr class="section-divider" />

       <section id="section-3"><app-bank-details></app-bank-details></section>
      <hr class="section-divider" /> 

      <section id="section-4"><app-instructions></app-instructions></section>
      <hr class="section-divider" />

      <section id="section-5"><app-attachments-documents></app-attachments-documents></section>
      <hr class="section-divider" />

      <section id="section-6"><app-preview></app-preview></section>
      <hr class="section-divider" /> 

       <div class="actions-row">
        <button type="submit" class="btn-primary">Submit</button>
      </div>

    </div>
  </div>
