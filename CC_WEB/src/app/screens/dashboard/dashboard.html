<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Welcome back, {{ userName }}</h1>
    <p>
      Your latest financial overview 
      <span class="live-sync">
        <mat-icon>sync</mat-icon> Live Sync
      </span>
      <small>({{ lastUpdated | date:'shortTime' }})</small>
    </p>
  </header>

  <section class="stats-grid">
    <div class="stat-card" *ngFor="let card of cards; let i = index" [style.border-left-color]="card.color">
      <div class="icon">{{ card.icon }}</div>
      <div class="details">
        <h2>{{ card.value }}</h2>
        <p>{{ card.title }}</p>
      </div>
    </div>
  </section>

  <section class="analytics">
    <div class="analytics-card" *ngFor="let news of newsCards">
      <h3>{{ news.title }}</h3>
      <div class="placeholder">{{ news.snippet }}</div>
    </div>
  </section>
</div>
