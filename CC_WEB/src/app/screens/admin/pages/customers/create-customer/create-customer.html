<div class="customer-container">

  <h2 class="page-title">Create Customer Profile</h2>
  <p class="page-subtitle">Enter the details below to register a new customer.</p>

  <div class="card">
    <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <!-- Name -->
        <div class="form-group">
          <label>Name</label>
          <input type="text" formControlName="Name" placeholder="Full Name">
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="Email" placeholder="example@email.com">
        </div>

        <!-- Contact -->
        <div class="form-group">
          <label>Contact</label>
          <input type="tel" formControlName="Contact" placeholder="+1 (555) 000-0000">
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>Status</label>
          <select formControlName="Status" class="dropdown">
            <option>Active</option>
            <option>Inactive</option>
            <option>Blocked</option>
          </select>
        </div>

        <!-- Branch Code -->
        <div class="form-group">
          <label>Branch Code</label>
          <select formControlName="Branch_Code" class="dropdown">
            <option value="">Select Branch</option>
          </select>
        </div>

        <!-- Country / City -->
        <div class="form-group">
          <label>Country / City</label>
          <select formControlName="Ctry_City" class="dropdown">
            <option value="">Select City</option>
          </select>
        </div>

        <!-- Customer Type -->
        <div class="form-group">
          <label>Customer Type</label>
          <select formControlName="Customer_Type" class="dropdown">
            <option>Regular</option>
            <option>Premium</option>
            <option>VIP</option>
          </select>
        </div>

        <!-- Company ID -->
        <div class="form-group">
          <label>Company ID</label>
          <input type="text" formControlName="Company_ID" placeholder="Company ID">
        </div>

        <!-- Address lines -->
        <div class="form-group full-width">
          <label>Address Line 1</label>
          <input type="text" formControlName="Address1" placeholder="Address Line 1">
        </div>

        <div class="form-group full-width">
          <label>Address Line 2</label>
          <input type="text" formControlName="Address2" placeholder="Address Line 2">
        </div>

        <div class="form-group full-width">
          <label>Address Line 3</label>
          <input type="text" formControlName="Address3" placeholder="Address Line 3">
        </div>

        <!-- Read-only fields in one row -->
        <div class="readonly-row">
          <div class="readonly-item">
            <label>Created On</label>
            <!-- <span>{{ createdOn || '2025-12-01' }}</span> -->
          </div>

          <div class="readonly-item">
            <label>Created By</label>
            <!-- <span>{{ createdBy || 'Admin User' }}</span> -->
          </div>

          <div class="readonly-item">
            <label>Updated On</label>
            <!-- <span>{{ updatedOn || '2025-12-01' }}</span> -->
          </div>

          <div class="readonly-item">
            <label>InputerID</label>
            <!-- <span>{{ putOn || '12345' }}</span> -->
          </div>

          <div class="readonly-item">
            <label>AuthorizedID</label>
            <!-- <span>{{ putById || 'Admin' }}</span> -->
          </div>
        </div>

      </div>

      <!-- Buttons row -->
      <div class="form-buttons professional">
        <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="button" class="btn-save" [disabled]="!customerForm.dirty" (click)="onSave()">Save</button>
        <button type="submit" class="btn-submit" [disabled]="customerForm.invalid">Submit</button>
      </div>

    </form>
  </div>

</div>
