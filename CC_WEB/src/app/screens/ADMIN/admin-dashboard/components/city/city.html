<!-- =========================
     CITY MASTER FORM
========================= -->
<div class="city-container" *ngIf="storeCity?.cityStatus !== CityStatus.Approved">

  <!-- Toggle Header -->
  <div class="section-header" (click)="toggle()">
    <h2>City Master</h2>
    <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
  </div>

  <!-- Collapsible Form -->
  <div
    class="collapsible"
    *ngIf="cityForm"
    [class.open]="isOpen"
    [formGroup]="cityForm"
  >

    <!-- =========================
         FORM FIELDS
    ========================= -->
    <div class="form-grid-2">

      <!-- City ID -->
      <div class="field-group">
        <h4>City ID</h4>
        <mat-form-field appearance="outline" class="full">
          <mat-label>City ID</mat-label>
          <input matInput type="text" formControlName="id" >
        </mat-form-field>
      </div>

      <!-- City Name -->
      <div class="field-group">
        <h4>City Name</h4>
        <mat-form-field appearance="outline" class="full">
          <mat-label>City Name</mat-label>
          <input matInput type="text" formControlName="cityName">
        </mat-form-field>
      </div>

      <!-- State -->
      <div class="field-group">
        <h4>State</h4>
        <mat-form-field appearance="outline" class="full">
          <mat-label>State</mat-label>
          <input matInput type="text" formControlName="state">
        </mat-form-field>
      </div>

      <!-- Country -->
      <div class="field-group">
        <h4>Country</h4>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Country</mat-label>
          <input matInput type="text" formControlName="country">
        </mat-form-field>
      </div>

    </div>

    <!-- =========================
         ACTIONS
    ========================= -->
    <div class="actions">

      <!-- ================= Draft Mode ================= -->
      <ng-container *ngIf="storeCity?.cityStatus === CityStatus.Draft">
        <button mat-stroked-button color="primary" type="button" (click)="back()">
          Back
        </button>

        <button
          mat-flat-button
          color="accent"
          type="button"
          [disabled]="!cityForm.dirty || !cityForm.valid"
          (click)="update()"
        >
          Update
        </button>

        <button
          mat-flat-button
          color="primary"
          type="button"
          [disabled]="!cityForm.valid"
          (click)="submit()"
        >
          Submit
        </button>
      </ng-container>

      <!-- ================= Submitted Mode ================= -->
      <ng-container *ngIf="storeCity?.cityStatus === CityStatus.Submitted">
        <button
          mat-stroked-button
          color="primary"
          type="button"
          (click)="reject(storeCity!.id)"
        >
          Reject
        </button>

        <button
          mat-flat-button
          color="accent"
          type="button"
          (click)="approve(storeCity!.id)"
        >
          Approve
        </button>
      </ng-container>

      <!-- ================= Create Mode ================= -->
      <ng-container *ngIf="!storeCity">
        <button mat-stroked-button color="primary" type="button" (click)="cancel()">
          Cancel
        </button>

        <button
          mat-flat-button
          color="primary"
          type="button"
          [disabled]="!cityForm.valid"
          (click)="save()"
        >
          Save City
        </button>
      </ng-container>

    </div>
  </div>
</div>

<!-- =========================
     APPROVED CITY VIEW
========================= -->
<div *ngIf="storeCity?.cityStatus === CityStatus.Approved" class="approved-container">

  <div class="approved-header">
    <span class="approved-badge">✔ Approved</span>
    <h2>City Approved Details</h2>
  </div>

  <div class="details-grid">

    <div class="detail-row three-col">
      <div class="detail-item">
        <span class="label">City ID</span>
        <span class="value">{{ storeCity.id }}</span>
      </div>

      <div class="detail-item">
        <span class="label">City Name</span>
        <span class="value">{{ storeCity.cityName }}</span>
      </div>

      <div class="detail-item">
        <span class="label">State</span>
        <span class="value">{{ storeCity.state }}</span>
      </div>
    </div>

    <div class="detail-row three-col">
      <div class="detail-item">
        <span class="label">Country</span>
        <span class="value">{{ storeCity.country }}</span>
      </div>
    </div>

  </div>

  <div class="approved-actions">
    <button class="btn-back" (click)="back()">← Back</button>
    <button class="btn-edit" (click)="editApprovedCity(storeCity.id)">
      Amend
    </button>
  </div>

</div>
