<!-- Section Header -->
<div class="section-header" (click)="toggle()">
  <h2>City Master</h2>
  <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
</div>

<!-- Collapsible Container -->
<div class="collapsible" [class.open]="isOpen" [formGroup]="cityForm">

  <!-- keep DOM stable (NO @if / *ngIf) -->
  <div class="field-group">

    <h4>City Information</h4>

    <div class="form-grid">

      <!-- City ID -->
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>City ID *</mat-label>
          <input
            matInput
            type="number"
            formControlName="id"
            placeholder="Enter city ID" />
        </mat-form-field>
      </div>

      <!-- City Name -->
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>City Name *</mat-label>
          <input
            matInput
            formControlName="cityName"
            placeholder="Enter city name" />
        </mat-form-field>
      </div>

      <!-- State -->
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>State</mat-label>
          <input
            matInput
            formControlName="state"
            placeholder="Enter state" />
        </mat-form-field>
      </div>

      <!-- Country -->
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Country</mat-label>
          <input
            matInput
            formControlName="country"
            placeholder="Enter country" />
        </mat-form-field>
      </div>

    </div>

    <!-- Actions -->
    <div class="actions">
      <button mat-stroked-button type="button" (click)="reset()">
        Cancel
      </button>

      <button mat-flat-button type="submit" (click)="save()">
        Save
      </button>
    </div>

  </div>
</div>
