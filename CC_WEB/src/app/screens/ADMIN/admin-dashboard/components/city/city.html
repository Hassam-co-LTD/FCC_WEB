<!-- ========================= 
     CREATE CUSTOMER PAGE
========================= -->
<div class="create-customer-page">

  <!-- =========================
       Page Header
  ========================== -->
  <div class="page-header">
    <h1>Create Customer</h1>
  </div>

  <!-- =========================
       Customer Form Container
  ========================== -->
  <div class="customer-form-wrapper" [ngClass]="{'hide-when-approved': storeCity?.recordStatus=== 'A'}">

    <!-- Section Header -->
    <div class="section-header" (click)="toggle()">
      <h2>Customer General Details</h2>
      <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
    </div>

    <!-- Collapsible Form -->
    <div class="collapsible" [class.open]="isOpen" [formGroup]="cityForm">

      <ng-container *ngIf="isOpen">

        <!-- ---------------- BASIC DETAILS ---------------- -->
        <div class="form-grid form-grid-large">

          <div class="field-group">
            <h4>City ID</h4>
            <mat-form-field appearance="outline" class="full">
              <input matInput formControlName="cityId" placeholder="City ID" [readonly]="isReadOnly()" />
            </mat-form-field>
          </div>

          <div class="field-group">
            <h4>Name</h4>
            <mat-form-field appearance="outline" class="full">
              <input matInput formControlName="cityName" placeholder="Full Name" [readonly]="isReadOnly()" />
            </mat-form-field>
          </div>

          <div class="field-group">
            <h4>State</h4>
            <mat-form-field appearance="outline" class="full">
              <input matInput formControlName="state" placeholder="State" [readonly]="isReadOnly()" />
            </mat-form-field>
          </div>

          <div class="field-group">
            <h4>Country</h4>
            <mat-form-field appearance="outline" class="full">
              <input matInput formControlName="country" placeholder="Country" [readonly]="isReadOnly()" />
            </mat-form-field>
          </div>

        </div> <!-- ✅ form-grid CLOSED -->

      </ng-container>
    </div>
  </div>

  <!-- =========================
       CUSTOMER ACTION BUTTONS
  ========================== -->
  <div class="customer-actions">

    <!-- New -->
    <ng-container *ngIf="!storeCity || !storeCity.recordStatus">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-save" [disabled]="!cityForm.valid" (click)="onSave()">Save</button>
    </ng-container>

    <!-- Draft -->
    <ng-container *ngIf="isEditMode && storeCity?.recordStatus === 'I'">
      <button class="btn-back" (click)="onBack()">Back</button>
      <button class="btn-update"
              [disabled]="!cityForm.dirty || !cityForm.valid"
              (click)="update(storeCity.id)">
        Update
      </button>
      <button class="btn-submit" [disabled]="!cityForm.valid" (click)="submit()">Submit</button>
    </ng-container>

    <!-- Submitted -->
    <ng-container *ngIf="isEditMode && storeCity?.recordStatus === 'S'">
      <button class="btn-reject" (click)="reject(storeCity.id)">Reject</button>
      <button class="btn-approve" (click)="approve(storeCity.id)">Approve</button>
    </ng-container>

  </div>

  <!-- ---------------- APPROVED VIEW ---------------- -->
  <div class="approved-container" [ngClass]="{'hide-when-approved': storeCity?.recordStatus !== 'A'}">

    <div class="approved-header">
      <span class="approved-badge">✔ Approved</span>
      <h3>City Details</h3>
    </div>

    <div class="approved-info">
      <div class="info-item"><span class="key">City ID:</span> <span class="value">{{ storeCity.cityId }}</span></div>
      <div class="info-item"><span class="key">Name:</span> <span class="value">{{ storeCity.cityName }}</span></div>
      <div class="info-item"><span class="key">State:</span> <span class="value">{{ storeCity.state }}</span></div>
      <div class="info-item"><span class="key">Country:</span> <span class="value">{{ storeCity.country }}</span></div>
    </div>
  </div>

  <div class="approved-actions" *ngIf="storeCity?.recordStatus=== 'A'">
    <button class="btn-back" (click)="onBack()">Back</button>
    <button class="btn-update" (click)="reject(storeCity.id)">Amend</button>
  </div>

</div>
