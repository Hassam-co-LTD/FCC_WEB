<!-- =========================
     CITY MASTER FORM
========================= -->
<div class="city-container" [ngClass]="{'hidden': storeTnx?.cityStatus === 'A'}">

  <!-- Toggle Header -->
  <div class="section-header" (click)="isOpen = !isOpen">
    <h2>City Master</h2>
    <mat-icon>{{ isOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
  </div>

  <!-- Collapsible Form -->
  <div class="collapsible" [class.open]="isOpen" [formGroup]="TnxForm">

    <!-- Plain Input Fields (2 per row) -->
    <div class="form-grid-2">

  <!-- City ID -->
  <div class="field-group">
    <h4>City ID</h4>
    <mat-form-field appearance="outline" class="full">
      <mat-label>City ID</mat-label>
      <input matInput type="number" formControlName="id" [readonly]="isReadOnly()">
    </mat-form-field>
  </div>

  <!-- City Name -->
  <div class="field-group">
    <h4>City Name</h4>
    <mat-form-field appearance="outline" class="full">
      <mat-label>City Name</mat-label>
      <input matInput type="text" formControlName="cityName" [readonly]="isReadOnly()">
    </mat-form-field>
  </div>

  <!-- State -->
  <div class="field-group">
    <h4>State</h4>
    <mat-form-field appearance="outline" class="full">
      <mat-label>State</mat-label>
      <input matInput type="text" formControlName="state" [readonly]="isReadOnly()">
    </mat-form-field>
  </div>

  <!-- Country -->
  <div class="field-group">
    <h4>Country</h4>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Country</mat-label>
      <input matInput type="text" formControlName="country" [readonly]="isReadOnly()">
    </mat-form-field>
  </div>
</div>

    <!-- Actions -->
    <!-- =========================
     CITY MASTER FORM ACTIONS
========================= -->
<div class="actions">
  <!-- Draft / Update Mode -->
  <ng-container *ngIf="storeTnx?.cityStatus === 'D'">
    <button mat-stroked-button color="primary" type="button" (click)="back()">Back</button>
    <button mat-flat-button color="accent" type="button"
            [disabled]="!TnxForm.dirty || !TnxForm.valid || isReadOnly()"
            (click)="update()">Update</button>
    <button mat-flat-button color="primary" type="button"
            [disabled]="!TnxForm.valid || isReadOnly()"
            (click)="submit()">Submit</button>
  </ng-container>

  <!-- Submitted / Approval Mode -->
  <ng-container *ngIf="storeTnx?.cityStatus === 'S'">
    <button mat-stroked-button color="primary" type="button" (click)="reject(storeTnx.id)">Reject</button>
    <button mat-flat-button color="accent" type="button" (click)="approve(storeTnx.id)">Approve</button>
  </ng-container>

  <!-- Create / New Mode -->
  <ng-container *ngIf="!['D','S','A'].includes(storeTnx?.cityStatus)">
    <button mat-stroked-button color="primary" type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="button" 
            [disabled]="!TnxForm.valid" (click)="save()">Save City</button>
  </ng-container>
</div>

</div> <!-- End collapsible -->
</div> <!-- End city-container -->

<!-- =========================
     APPROVED CITY VIEW
  ========================= -->
<div *ngIf="storeTnx?.cityStatus === 'A'" class="approved-container">

  <div class="approved-header">
    <span class="approved-badge">✔ Approved</span>
    <h2>City Approved Details</h2>
  </div>

  <div class="details-grid">
    <div class="detail-row three-col">
      <div class="detail-item">
        <span class="label">City ID</span>
        <span class="value">{{ storeTnx.id }}</span>
      </div>

      <div class="detail-item">
        <span class="label">City Name</span>
        <span class="value">{{ storeTnx.cityName }}</span>
      </div>

      <div class="detail-item">
        <span class="label">State</span>
        <span class="value">{{ storeTnx.state }}</span>
      </div>
    </div>

    <div class="detail-row three-col">
      <div class="detail-item">
        <span class="label">Country</span>
        <span class="value">{{ storeTnx.country }}</span>
      </div>
    </div>
  </div>

  <div class="approved-actions">
    <button class="btn-back" (click)="back()">← Back</button>
    <button class="btn-edit" (click)="editApprovedTnx(storeTnx.id)">
      Amend
    </button>
  </div>
 
</div>
