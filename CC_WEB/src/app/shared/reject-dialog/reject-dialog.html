<div class="reject-dialog-container">
    <h2 class="dialog-title">Reject Transaction</h2>

    <p class="dialog-subtitle">Please provide a reason for rejection:</p>

    <textarea class="reason-textarea" rows="5" [formControl]="reason"
        placeholder="Enter rejection reason (max 250 characters)">
  </textarea>

    <div *ngIf="reason.invalid && reason.touched" class="error-message">
     {{ errorMessage}}
    </div>

    <div class="actions">
        <button  mat-stroked-button color="primary" (click)="close()">Cancel</button>
        <button  mat-flat-button color="accent"[disabled]="reason.invalid" (click)="confirm()">Reject</button>
    </div>
</div>
