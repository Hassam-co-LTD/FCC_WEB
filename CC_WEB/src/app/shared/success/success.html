<div class="success-page">

  <div class="success-icon">✔</div>

  <h1>Success</h1>
  <p>Your transaction is successfully released to the bank.</p>

  <!-- 🔒 Read-only Preview -->
  <app-preview
    [transaction]="transaction"
    [readonly]="true"
    [hideActions]="true">
  </app-preview>

  <div class="actions">
    <button mat-flat-button color="primary" (click)="goToListing()">
      {{ pageName1 }}
    </button>

    <button mat-stroked-button color="primary" (click)="createNew()">
      {{ pageName2 }}
    </button>
  </div>

</div>
