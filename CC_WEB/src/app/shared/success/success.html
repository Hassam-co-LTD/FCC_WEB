<div class="success-page">
  <div class="success-icon">✔</div>

  <h1>Success</h1>
  
  <p>
    Your transaction has been successfully processed.
  </p>
  
  <h2 *ngIf="reference || tnxId" class="reference-id">
    {{ reference || tnxId }}
  </h2>

  <div class="actions">
    <button mat-flat-button color="primary" (click)="goToListing()">
      {{ pageName1 }}
    </button>

    <button mat-stroked-button color="primary" (click)="createNew()">
      {{ pageName2 }}
    </button>
  </div>
</div>
