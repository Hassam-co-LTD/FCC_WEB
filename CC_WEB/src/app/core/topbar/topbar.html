<header class="topbar">
  <!-- Group hamburger + title -->
  <div class="left-group">
    <div class="brand">
      <img src="/branding/infotech-logo.jpg" alt="Infotech" class="brand-logo" routerLink="/dashboard" />
    </div>
    <!-- <div class="left">
      <span class="app-title">Trade Finance Portal</span>
    </div> -->
  </div>

  <!-- Center Navigation -->
  <nav class="nav" [class.open]="menuVisible">

    <a routerLink="/dashboard">Dashboard</a>

    <!-- Trade Services Dropdown -->
    <div class="dropdown">
      <button class="menu-btn" (click)="toggleMenu()" [class.active]="menuOpen">
        Trade Services
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      @if (menuOpen) {
      <ul class="dropdown-menu">
        <li><button [routerLink]="['/import-welcome']" (click)="closeMenu()">Import LC</button></li>
        <li><button [routerLink]="['/exportlc-welcome']" (click)="closeMenu()">Export LC</button></li>
        <!-- <li><button [[routerLink]]="['/shipping-guarantee-screen']" (click)="closeMenu()">Shipping Guarantee</button></li>
          <li><button [routerLink]="['/financial-request']" (click)="closeMenu()">Financial Request</button></li>
          <li><button [routerLink]="['/export-collection']" (click)="closeMenu()">Export Collection</button></li> -->
      </ul>
      }
    </div>

    <a routerLink="/settings" routerLinkActive="active">Settings</a>
    
  
    <span> {{ userName }}</span>
    <span class="last-login"> {{ lastGoodLogin }}</span>
  

  </nav>

  <!-- Right User Menu -->
  <div class="right">

    <button mat-icon-button>
      <mat-icon>notifications</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="userMenu" class="profile-btn">
      <span class="name">{{ Name }}</span>
      <mat-icon>keyboard_arrow_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon> Profile
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon> Settings
      </button>
      <button mat-menu-item>
        <mat-icon>logout</mat-icon> Logout
      </button>
    </mat-menu>

  </div>

</header>
