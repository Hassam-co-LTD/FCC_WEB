<header class="topbar">

  <!-- Group hamburger + title -->
  <div class="left-group">
    <div class="brand" routerLink="/dashboard">
      <img src="/branding/infotech-logo.jpg" alt="Infotech" class="brand-logo" />
    </div>
  </div>

  <!-- Center Navigation -->
  <nav class="nav" [class.open]="menuVisible">

    <a routerLink="/dashboard" class="nav-link">Dashboard</a>

    <!-- Trade Services Dropdown -->
    <div class="dropdown">
      <button class="menu-btn" (click)="toggleMenu()" [class.active]="menuOpen">
        Trade Services
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      @if (menuOpen) {
      <ul class="dropdown-menu">
        <li><button [routerLink]="['/import-welcome']" (click)="closeMenu()">Import LC</button></li>
        <li><button [routerLink]="['/exportlc-welcome']" (click)="closeMenu()">Export LC</button></li>
        <li><button [routerLink]="['/shipping-welcome']" (click)="closeMenu()">Shipping Guarantee</button></li>
        <li><button [routerLink]="['/export-collection']" (click)="closeMenu()">Export Collection</button></li>
        <li><button [routerLink]="['/undertaking-welcome']" (click)="closeMenu()">Undertaking Guarantee</button></li>
      </ul>
      }
    </div>

    <div class="user-meta">
      <span class="user-name">{{ userName }}</span>
      <span class="last-login">Last login: {{ lastGoodLogin }}</span>
    </div>

  </nav>

  <!-- Right User Menu -->
  <div class="right">

    <button mat-icon-button class="icon-btn" aria-label="Notifications">
      <mat-icon>notifications</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="userMenu" class="profile-btn">
      <span class="avatar">{{ Name.charAt(0) }}</span>
      <span class="name">{{ Name }}</span>
      <mat-icon>keyboard_arrow_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="profile-menu" xPosition="before">

      <div class="menu-header">
        <span class="menu-avatar">{{ Name.charAt(0) }}</span>
        <div class="menu-header-text">
          <span class="menu-name">{{ Name }}</span>
          <span class="menu-role">{{ userName }}</span>
        </div>
      </div>

      <mat-divider></mat-divider>

      <button mat-menu-item class="menu-row">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>

      <button mat-menu-item class="menu-row">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>

      <button mat-menu-item class="menu-row" (click)="goToChangePassword()">
        <mat-icon>lock</mat-icon>
        <span>Change Password</span>
      </button>

      <mat-divider></mat-divider>

      <button mat-menu-item class="menu-row logout-item">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>

    </mat-menu>

  </div>

</header>
