<header class="topbar">

    <!-- Left logo + app name -->
    <div class="left">
        <!-- <img src="assets/logo.png" class="logo" alt="Bank Logo" /> -->
        <span class="app-title">Trade Finance Portal</span>
    </div>

    <!-- Center Nav -->
    <nav class="nav">
        <a routerLink="/">Home</a>
        <a routerLink="/dashboard">Dashboard</a>
        <a routerLink="/import-lc">Import LC</a>
        <a routerLink="/guarantees">Guarantees</a>
    </nav>

    <!-- Right User Panel -->
    <div class="right">

        <button mat-icon-button>
            <mat-icon>notifications</mat-icon>
        </button>

        <button mat-button [matMenuTriggerFor]="userMenu" class="profile-btn">
            <!-- <img src="assets/user-avatar.png" class="avatar" /> -->
            <span class="name">Hassam</span>
            <mat-icon>keyboard_arrow_down</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
            <button mat-menu-item>
                <mat-icon>person</mat-icon>
                Profile
            </button>
            <button mat-menu-item>
                <mat-icon>settings</mat-icon>
                Settings
            </button>
            <button mat-menu-item>
                <mat-icon>logout</mat-icon>
                Logout
            </button>
        </mat-menu>
    </div>

</header>
