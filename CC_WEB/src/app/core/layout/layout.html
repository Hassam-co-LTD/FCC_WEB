<div class="layout">

  <!-- Top Navigation -->
  <app-topbar></app-topbar>

  <div class="body-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" [class.collapsed]="isCollapsed()">

      <!-- Toggle Button -->
      <button class="toggle-btn" (click)="toggleSidebar()">
        <mat-icon>{{ isCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>

      <!-- MENU -->
      <nav>
        <ng-container [ngSwitch]="currentMenu">

          <!-- DEFAULT MENU -->
          <ng-container *ngSwitchCase="'DEFAULT'">
            <ng-container *ngFor="let item of menuItems">
              <ng-container *ngTemplateOutlet="menuTemplate; context:{ $implicit: item }"></ng-container>
            </ng-container>
          </ng-container>

          <!-- SYSTEM MENU -->
          <ng-container *ngSwitchCase="'SYSTEM'">
            <ng-container *ngFor="let item of systemOverviewMenu">
              <ng-container *ngTemplateOutlet="menuTemplate; context:{ $implicit: item }"></ng-container>
            </ng-container>
          </ng-container>

          <!-- MIDDLE-OFFICE MENU -->
          <ng-container *ngSwitchCase="'MIDDLE'">
            <ng-container *ngFor="let item of middleOfficeMenu">
              <ng-container *ngTemplateOutlet="menuTemplate; context:{ $implicit: item }"></ng-container>
            </ng-container>
          </ng-container>

        </ng-container>
      </nav>

      <!-- ======================== -->
      <!-- REUSABLE MENU TEMPLATE   -->
      <!-- ======================== -->
      <ng-template #menuTemplate let-item>

        <!-- MENU ITEM WITH CHILDREN -->
        <div *ngIf="item.children" class="menu-group">

          <!-- Parent row -->
          <button class="menu-btn" (click)="item.label === 'Customers' ? onCustomerClick(item) : toggleMenu(item)">
            <mat-icon *ngIf="item.icon">{{ item.icon }}</mat-icon>
            <span *ngIf="!isCollapsed()">{{ item.label }}</span>
            <mat-icon class="arrow" *ngIf="!isCollapsed()">
              {{ item.open ? 'expand_less' : 'expand_more' }}
            </mat-icon>
          </button>

          <!-- Submenu -->
          <div class="submenu" *ngIf="item.open && !isCollapsed()">

            <ng-container *ngFor="let child of item.children">

              <!-- Child WITH nested submenu -->
              <div *ngIf="child.children" class="submenu-item">

                <button type="button" (click)="goTo(child)">
                  {{ child.label }}
                  <mat-icon class="arrow" (click)="toggleMenu(child); $event.stopPropagation()">
                    {{ child.open ? 'expand_less' : 'expand_more' }}
                  </mat-icon>
                </button>

                <!-- Nested submenu -->
                <div class="nested-submenu" *ngIf="child.open">
                  <button *ngFor="let sub of child.children" [routerLink]="sub.route" routerLinkActive="active-sub">
                    {{ sub.label }}
                  </button>
                </div>

              </div>

              <!-- Child WITHOUT submenu -->
              <button *ngIf="!child.children" [routerLink]="child.route" routerLinkActive="active-sub">
                {{ child.label }}
              </button>

            </ng-container>

          </div>
        </div>

        <!-- SIMPLE LINK (NO CHILDREN) -->
        <a *ngIf="!item.children" [routerLink]="item.route" (click)="item.label === 'Logout' ? Logout() : null" routerLinkActive="active-link">
          <mat-icon *ngIf="item.icon">{{ item.icon }}</mat-icon>
          <span *ngIf="!isCollapsed()">{{ item.label }}</span>
        </a>

      </ng-template>

    </aside>

    <!-- Main Content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>
  <!-- Footer -->
  <footer class="app-footer">
    © All Rights Reserved – Infotech Pvt Ltd
  </footer>
</div>
