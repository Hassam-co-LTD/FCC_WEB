<div class="layout">

    <!-- Top Navigation -->
    <app-topbar></app-topbar>

    <div class="body-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar" [class.collapsed]="isCollapsed()">

            <!-- Toggle Button -->
            <button class="toggle-btn" (click)="toggleSidebar()">
                <mat-icon>{{ isCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
            </button>

            <!-- Menu -->
            <nav>

                <ng-container [ngSwitch]="currentMenu">

                    <!-- DEFAULT MENU -->
                    <ng-container *ngSwitchCase="'DEFAULT'">
                        <ng-container *ngFor="let item of menuItems">

                            <!-- Parent section like Trade Services -->
                            <div *ngIf="item.children?.length" class="menu-group">

                                <!-- Parent button: ONLY toggle -->
                                <button class="menu-btn" (click)="toggleMenu(item)">
                                    <mat-icon>{{ item.icon }}</mat-icon>
                                    <span *ngIf="!isCollapsed()">{{ item.label }}</span>
                                    <mat-icon class="arrow" *ngIf="!isCollapsed()">
                                        {{ item.open ? 'expand_less' : 'expand_more' }}
                                    </mat-icon>
                                </button>

                                <!-- SUBMENU LEVEL 1 -->
                                <div class="submenu" *ngIf="item.open && !isCollapsed()">

                                    <ng-container *ngFor="let child of item.children">

                                        <!-- IF CHILD HAS ITS OWN SUBMENU (Import LC) -->
                                        <div *ngIf="child.children?.length" class="submenu-item">

                                            <!-- Label → navigate to welcome | Arrow → expand -->
                                            <button type="button" (click)="goTo(child)">
                                                {{ child.label }}
                                                <mat-icon class="arrow"
                                                    (click)="toggleMenu(child); $event.stopPropagation()">
                                                    {{ child.open ? 'expand_less' : 'expand_more' }}
                                                </mat-icon>
                                            </button>

                                            <!-- Nested submenu (Create / Amend) -->
                                            <div class="nested-submenu" *ngIf="child.open">
                                                <button *ngFor="let sub of child.children" [routerLink]="sub.route"
                                                    routerLinkActive="active-sub">
                                                    {{ sub.label }}
                                                </button>
                                            </div>

                                        </div>

                                        <!-- CHILD WITHOUT SUBMENU -->
                                        <button *ngIf="!child.children" [routerLink]="child.route"
                                            routerLinkActive="active-sub">
                                            {{ child.label }}
                                        </button>

                                    </ng-container>

                                </div>
                            </div>

                            <!-- SIMPLE LINKS (Dashboard, Settings, etc) -->
                            <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="active-link">
                                <mat-icon>{{ item.icon }}</mat-icon>
                                <span *ngIf="!isCollapsed()">{{ item.label }}</span>
                            </a>

                        </ng-container>
                    </ng-container>

                </ng-container>

            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>
